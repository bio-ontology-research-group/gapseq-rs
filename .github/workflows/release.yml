name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux' && matrix.cross != true
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin gapsmith
          else
            cargo build --release --target ${{ matrix.target }} --bin gapsmith
          fi

      - name: Package
        run: |
          STAGING=gapsmith-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p "$STAGING"
          cp target/${{ matrix.target }}/release/gapsmith${{ matrix.ext }} "$STAGING/"
          cp README.md LICENSE COMPARISON.md "$STAGING/"
          cp -r data "$STAGING/"
          tar czvf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gapsmith-${{ matrix.target }}
          path: |
            gapsmith-*.tar.gz
            gapsmith-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
