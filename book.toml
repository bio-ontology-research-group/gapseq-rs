[book]
title = "gapsmith"
description = "Rust reimplementation of gapseq — metabolic network reconstruction"
authors = ["bio-ontology-research-group"]
language = "en"
multilingual = false
src = "docs"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/bio-ontology-research-group/gapsmith"
edit-url-template = "https://github.com/bio-ontology-research-group/gapsmith/edit/main/{path}"
site-url = "/gapsmith/"
cname = ""

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
